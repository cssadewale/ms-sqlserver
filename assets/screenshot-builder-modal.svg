<g fill="#ccc" font-size="11.5">
<text x="20" y="270">15+ years standing in Nigerian classrooms — Nursery, Primary, JSS, SSS — teaching</text>
<text x="20" y="286">Mathematics, Further Mathematics, Physics, Chemistry, and Computer Science across</text>
<text x="20" y="302">His Marvellous Grace, Fredaks, Anchor Heights, Dave Model, and more schools.</text>
<text x="20" y="324">In 2023, completed B.Sc(Ed) Computer Science Education at Lagos State University.</text>
<text x="20" y="340">In 2025, the breakthrough through 3MTT (3 Million Technical Talent) Nigeria unlocked</text>
<text x="20" y="356">data science capability.</text>
</g>
<rect x="20" y="372" width="3" height="40" fill="#0078d4"/>
<text x="34" y="388" fill="#0078d4" font-style="italic" font-size="11.5">"I did not wait to become a developer. I used clear thinking and AI leverage</text>
<text x="34" y="404" fill="#0078d4" font-style="italic" font-size="11.5">to build the tools my students needed."</text>
