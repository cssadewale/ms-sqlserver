<text x="344" y="172" fill="#6a9955" font-style="italic">-- T-SQL with auto-translation enabled</text>
<text x="344" y="190" fill="#6a9955" font-style="italic">-- Built by Adewale Samson Adeagbo · cssadewale</text>
<text x="344" y="226" fill="#c586c0">DECLARE</text>
<text x="404" y="226" fill="#9cdcfe">@minSalary</text>
<text x="490" y="226" fill="#4ec9b0">INT</text>
<text x="525" y="226" fill="#d4d4d4">=</text>
<text x="540" y="226" fill="#b5cea8">600000</text>
<text x="592" y="226" fill="#d4d4d4">;</text>
<text x="344" y="262" fill="#569cd6" font-weight="600">SELECT</text>
<text x="412" y="262" fill="#569cd6" font-weight="600">TOP</text>
<text x="448" y="262" fill="#b5cea8">10</text>
<text x="372" y="280" fill="#d4d4d4">e.first_name,</text>
<text x="372" y="298" fill="#d4d4d4">e.department,</text>
<text x="372" y="316" fill="#dcdcaa">IIF</text>
<text x="402" y="316" fill="#d4d4d4">(e.salary &gt;</text>
<text x="486" y="316" fill="#b5cea8">800000</text>
<text x="546" y="316" fill="#d4d4d4">,</text>
<text x="558" y="316" fill="#ce9178">'High'</text>
<text x="608" y="316" fill="#d4d4d4">,</text>
<text x="620" y="316" fill="#ce9178">'Standard'</text>
<text x="700" y="316" fill="#d4d4d4">) </text>
<text x="722" y="316" fill="#569cd6">AS</text>
<text x="746" y="316" fill="#d4d4d4">band,</text>
<text x="372" y="334" fill="#dcdcaa">YEAR</text>
<text x="412" y="334" fill="#d4d4d4">(e.hire_date) </text>
<text x="528" y="334" fill="#569cd6">AS</text>
<text x="552" y="334" fill="#d4d4d4">year_joined,</text>
<text x="372" y="352" fill="#dcdcaa">ISNULL</text>
<text x="426" y="352" fill="#d4d4d4">(e.city,</text>
<text x="498" y="352" fill="#ce9178">'Unknown'</text>
<text x="576" y="352" fill="#d4d4d4">) </text>
<text x="598" y="352" fill="#569cd6">AS</text>
<text x="622" y="352" fill="#d4d4d4">city</text>
<text x="344" y="370" fill="#569cd6" font-weight="600">FROM</text>
<text x="388" y="370" fill="#d4d4d4">dbo.employees e</text>
<text x="344" y="388" fill="#569cd6" font-weight="600">WHERE</text>
<text x="396" y="388" fill="#d4d4d4">e.salary &gt; </text>
<text x="478" y="388" fill="#9cdcfe">@minSalary</text>
<text x="344" y="406" fill="#569cd6" font-weight="600">ORDER BY</text>
<text x="420" y="406" fill="#d4d4d4">e.salary </text>
<text x="490" y="406" fill="#569cd6">DESC</text>
<text x="528" y="406" fill="#d4d4d4">;</text>
</g>
